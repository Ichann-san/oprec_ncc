# =============================================
# LogPulse Mini SIEM — Docker Compose
# Services: backend, prometheus, grafana, sonarqube, jenkins
# =============================================

version: "3.8"

services:
  # --- LogPulse Backend ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logpulse-backend
    ports:
      - "8000:8000"
    environment:
      - LOGPULSE_DB_PATH=/app/data/logpulse.db
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-YOUR_DISCORD_WEBHOOK_URL}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    networks:
      - logpulse-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    container_name: logpulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../task3/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../task3/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - logpulse-net
    depends_on:
      - backend

  # --- Grafana ---
  grafana:
    image: grafana/grafana:latest
    container_name: logpulse-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../../task3/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../task3/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - logpulse-net
    depends_on:
      - prometheus

  # --- SonarQube ---
  sonarqube:
    image: sonarqube:lts-community
    container_name: logpulse-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped
    networks:
      - logpulse-net

  # --- Jenkins ---
  jenkins:
    image: jenkins/jenkins:lts
    container_name: logpulse-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
    restart: unless-stopped
    networks:
      - logpulse-net

# --- Volumes ---
volumes:
  backend_data:
  prometheus_data:
  grafana_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  jenkins_data:

# --- Networks ---
networks:
  logpulse-net:
    driver: bridge
