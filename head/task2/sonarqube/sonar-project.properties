# =============================================
# LogPulse Mini SIEM — SonarQube Project Configuration
# Used by sonar-scanner during Jenkins pipeline
# =============================================

# Project identification
sonar.projectKey=logpulse-mini-siem
sonar.projectName=LogPulse Mini SIEM
sonar.projectVersion=1.0.0

# Source code location (relative to this file's location)
sonar.sources=../task1/backend/app

# Language
sonar.language=py
sonar.python.version=3.11

# Source encoding
sonar.sourceEncoding=UTF-8

# Exclusions — files to skip during analysis
sonar.exclusions=\
    **/venv/**,\
    **/__pycache__/**,\
    **/static/**,\
    **/templates/**,\
    **/*.json,\
    **/tests/**

# Test directories
sonar.tests=../task1/backend/tests
sonar.test.inclusions=**/test_*.py

# Coverage report (if generated)
# sonar.python.coverage.reportPaths=coverage.xml

# Duplication detection
sonar.cpd.minimumTokens=50
sonar.cpd.minimumLines=5

# Quality Gate
# Default quality gate checks:
#   - No new bugs
#   - No new vulnerabilities
#   - No new code smells (A rating)
#   - Duplicated lines < 3% on new code
